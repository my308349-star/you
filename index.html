<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Navbar</title>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#f5f5f5;
}

/* Navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#333;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

/* Link Colors */
.home{color:#007BFF;}
.about{color:#28A745;}
.services{color:#FFC107;}
.contact{color:#DC3545;}

.home:hover{color:#0056b3;}
.about:hover{color:#1e7e34;}
.services:hover{color:#d39e00;}
.contact:hover{color:#a71d2a;}

/* Button */
.btn{
    padding:10px 20px;
    border:none;
    background:#007BFF;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#0056b3;
}

/* Hamburger */
.menu-toggle{
    display:none;
    font-size:30px;
    cursor:pointer;
}

/* Sections */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    padding-top:70px;
}

#home{
    background:#cce5ff;
}

#about{
    background:#d4edda;
}

#services{
    background:#fff3cd;
}

#contact{
    background:#f8d7da;
}

/* Responsive */
@media(max-width:768px){

    .navbar{
        padding:15px 20px;
        flex-wrap:wrap;
    }

    .menu-toggle{
        display:block;
    }

    .btn{
        display:none;
    }

    .nav-links{
        display:none;
        flex-direction:column;
        width:100%;
        background:#fff;
        margin-top:15px;
        gap:0;
    }

    .nav-links li{
        text-align:center;
        border-top:1px solid #ddd;
    }

    .nav-links a{
        display:block;
        padding:15px;
    }

    section{
        font-size:30px;
        text-align:center;
        padding:90px 20px;
    }
}
</style>

</head>
<body>

<nav class="navbar">

    <div class="logo">MyLogo</div>

    <div class="menu-toggle">&#9776;</div>

    <ul class="nav-links">
        <li><a href="#home" class="scroll-link home">Home</a></li>
        <li><a href="#about" class="scroll-link about">About</a></li>
        <li><a href="#services" class="scroll-link services">Services</a></li>
        <li><a href="#contact" class="scroll-link contact">Contact</a></li>
    </ul>

    <button class="btn">Login</button>

</nav>

<section id="home">Home Section</section>
<section id="about">About Section</section>
<section id="services">Services Section</section>
<section id="contact">Contact Section</section>

<script>
$(document).ready(function(){

    // Smooth Scroll
    $(".scroll-link").click(function(e){

        e.preventDefault();

        let target=$(this).attr("href");

        $("html,body").animate({
            scrollTop:$(target).offset().top-60
        },500);

        if($(window).width()<=768){
            $(".nav-links").slideUp();
        }

    });

    // Mobile Menu
    $(".menu-toggle").click(function(){
        $(".nav-links").slideToggle();
    });

});
</script>

</body>
</html>
